<!DOCTYPE html> <!-- Сообщает браузеру, что документ написан по стандарту HTML5 -->
<html lang="ru"> <!-- Открывает HTML документ. lang="ru" указывает, что язык страницы — русский -->
<head> <!-- В теге head хранятся скрытые настройки страницы -->
    <meta charset="UTF-8"> <!-- Включает поддержку русской кириллицы (кодировка UTF-8) -->
    <title>Dota 2 — Контакты</title> <!-- Текст, который выводится на вкладке браузера вверху окна -->
    <!-- Подключаем внешний файл стилей style.css, чтобы к странице применился дизайн -->
    <link rel="stylesheet" href="style.css"> <!-- Тег link связывает HTML-код с CSS-файлом -->
</head> <!-- Конец настроек -->
<body> <!-- Открывает область страницы, которая будет выведена на экран пользователя -->

<div class="container"> <!-- Главный блок-контейнер страницы, центрирует контент (за счет класса container) -->

    <!-- Навигационное меню сайта -->
    <nav class="menu"> <!-- Открывает меню навигации -->
        <a href="index.html">🏠 Главная</a> <!-- Ссылка на главную страницу -->
        <a href="catalog.html">📜 Герои</a> <!-- Ссылка на таблицу героев -->
        <a href="gallery.html">🖼 Галерея</a> <!-- Ссылка на сетку изображений -->
        <a href="contacts.html">📞 Контакты</a> <!-- Ссылка на текущую страницу контактов -->
    </nav> <!-- Конец навигации -->

    <!-- Заголовок страницы -->
    <h1>Контакты</h1> <!-- Главный заголовок h1 -->
    <p style="text-align: center;">Есть вопрос или предложение? Напишите нам!</p> <!-- Обычный текст (абзац p). Свойство style="text-align: center;" выравнивает его по центру -->

    <!-- Двухколоночный блок (картинка слева, форма справа) -->
    <div style="display: flex; gap: 30px; margin-top: 25px;"> <!-- Родительский блок. Включает режим Flexbox (display: flex), который выставляет элементы внутри в один горизонтальный ряд с расстоянием 30px (gap: 30px) -->

        <!-- Левая колонка: Изображение персонажа Pudge -->
        <div style="flex: 1;"> <!-- Этот блок займет 1 долю свободного пространства внутри Flexbox (здесь будет лежать картинка) -->
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/pudge.png" alt="Pudge" title="Pudge" style="width: 100%; border-radius: 10px;"> <!-- Тег img для вставки картинки. Атрибут title добавит всплывающую подсказку имени при наведении мышки -->
        </div> <!-- Конец левой колонки -->

        <!-- Правая колонка: Форма обратной связи -->
        <div style="flex: 2;"> <!-- Этот блок займет 2 доли свободного пространства (он будет шире левой колонки). Здесь лежит форма. -->
            <form> <!-- Открывает веб-форму (блок с полями для ввода данных) -->

                <!-- Поле ввода имени -->
                <div class="form-group"> <!-- Группирует текст (label) и поле (input), чтобы в CSS им можно было дать красивый отступ снизу -->
                    <label>Ваше имя</label> <!-- Тег label: текстовая надпись (подпись) над полем ввода -->
                    <input type="text" id="name" placeholder="Введите имя"> <!-- Поле для ввода текста (type="text"). Атрибут id="name" нужен для JavaScript, а placeholder показывает серую подсказку -->
                </div> <!-- Конец группы "имя" -->

                <!-- Поле ввода почты (Email) -->
                <div class="form-group"> <!-- Группа для почты -->
                    <label>Email</label> <!-- Текстовая надпись -->
                    <input type="email" id="email" placeholder="example@mail.ru"> <!-- Поле для почты. type="email" подсказывает смартфонам показать клавиатуру с символом @. id="email" нужен для JS. -->
                </div> <!-- Конец группы "email" -->

                <!-- Поле ввода текста сообщения -->
                <div class="form-group"> <!-- Группа для сообщения -->
                    <label>Сообщение</label> <!-- Текстовая надпись -->
                    <textarea rows="4" id="message" placeholder="Ваш текст..."></textarea> <!-- Тег textarea: большое многострочное поле ввода. rows="4" задает высоту поля в 4 строки. -->
                </div> <!-- Конец группы "сообщение" -->

                <!-- Кнопка отправки. type="button" предотвращает перезагрузку страницы -->
                <button type="button" class="btn" onclick="sendForm()">Отправить</button> <!-- Тег button: кнопка. Класс btn задает ей красивый вид в CSS. onclick="sendForm()" при клике мыши запускает скрипт JavaScript! -->

            </form> <!-- Конец веб-формы -->
        </div> <!-- Конец правой колонки -->

    </div> <!-- Конец всего двухколоночного блока -->

    <!-- Подвал страницы -->
    <footer> <!-- Тег footer используется для нижнего блока сайта -->
        <p>Неофициальный гайд по Dota 2 | 2026</p> <!-- Копирайт (абзац p) -->
    </footer> <!-- Конец подвала -->

</div> <!-- Конец главного контейнера страницы -->

<!-- JavaScript скрипт для обработки нажатия на кнопку -->
<script> // Тег script открывает зону, где пишется код JavaScript
    // function означает создание своей команды (функции) с именем sendForm, которая вызывается при клике на кнопку.
    function sendForm() {
        
        // var name создает переменную (коробочку в памяти). 
        // document.getElementById("name") находит на странице наше поле ввода (input) по его уникальному id.
        // .value извлекает текст, который напечатал пользователь.
        var name    = document.getElementById("name").value;
        var email   = document.getElementById("email").value;
        var message = document.getElementById("message").value;

        // Проверяем: если имя (name) осталось пустым (равно "") ИЛИ (||) email остался пустым
        if (name === "" || email === "") {
            // alert() вызывает системное всплывающее окно браузера с предупреждением.
            alert("Пожалуйста, заполните имя и email!");
            return; // Команда return моментально завершает работу функции (дальше код не пойдет).
        }

        // Если предыдущая проверка if была пройдена (поля заполнены), то выполняется эта строчка.
        // Оператор + склеивает куски текста вместе со значением, которое пользователь ввел в поле name.
        alert("Спасибо, " + name + "! Ваше сообщение отправлено.");
    }
</script> <!-- Конец зоны JavaScript -->

</body> <!-- Закрывает видимую часть сайта -->
</html> <!-- Конец файла HTML -->
