<!DOCTYPE html>
<html lang="ru"> 
<head> 
    <meta charset="UTF-8"> 
    <title>Dota 2 — Контакты</title> 
    
    <link rel="stylesheet" href="style.css"> 
</head> 
<body> 

<div class="container"> 

   
    <nav class="menu"> 
        <a href="index.html">🏠 Главная</a> 
        <a href="catalog.html">📜 Герои</a> 
        <a href="gallery.html">🖼 Галерея</a> 
        <a href="contacts.html">📞 Контакты</a> 
    </nav> 

    
    <h1>Контакты</h1> 
    <p style="text-align: center;">Есть вопрос или предложение? Напишите нам!</p> 

    
    <div style="display: flex; gap: 30px; margin-top: 25px;"> 

        
        <div style="flex: 1;"> 
            <img src="https://cdn.cloudflare.steamstatic.com/apps/dota2/images/dota_react/heroes/pudge.png" alt="Pudge" title="Pudge" style="width: 100%; border-radius: 10px;"> 
        </div> 

        
        <div style="flex: 2;"> 
            <form> 
             
                <div class="form-group"> 
                    <label>Ваше имя</label> 
                    <input type="text" id="name" placeholder="Введите имя"> 
                </div> 

                
                <div class="form-group"> 
                    <label>Email</label> 
                    <input type="email" id="email" placeholder="example@mail.ru"> 
                </div> 

                
                <div class="form-group"> 
                    <label>Сообщение</label> 
                    <textarea rows="4" id="message" placeholder="Ваш текст..."></textarea> 
                </div> 

               
                <button type="button" class="btn" onclick="sendForm()">Отправить</button> 
            </form> 
        </div> 

    </div> 

    
    <footer> 
        <p>Неофициальный гайд по Dota 2 | 2026</p> 
    </footer> 

</div> 


<script> 
    
    function sendForm() {
        
        
        var name    = document.getElementById("name").value;
        var email   = document.getElementById("email").value;
        var message = document.getElementById("message").value;

       
        if (name === "" || email === "") {
   
            alert("Пожалуйста, заполните имя и email!");
            return; 
        }

        
        alert("Спасибо, " + name + "! Ваше сообщение отправлено.");
    }
</script> 

</body> 
</html>
